# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.

# Theme Settings
# 使用 GitHub Pages 兼容的远程主题
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Site Settings
locale: "zh-CN"
direction: "ltr"
title: "Ethan 的博客"
title_separator: "|"
subtitle: "记录学习与生活"
name: "Ethan"
description: "Ethan 的个人博客，分享技术、学习与生活感悟。"
url: "https://ethankiez.github.io"
baseurl: "" # 如果是 Project Pages，例如 /blog，则填写 "/blog"
repository: "EthanKIEZ/EthanKIEZ.github.io"
# teaser: /assets/images/500x300.png
# logo: "/assets/images/88x88.png"
masthead_title: # overrides the website title displayed in the masthead, use " " for no title
breadcrumbs: true
words_per_minute: 200
enable_copy_code_button: true
copyright: "Ethan"
copyright_url: "https://ethankiez.github.io"

# Comments
comments:
  provider: # false (default), "disqus", "discourse", "facebook", "staticman", "staticman_v2", "utterances", "giscus", "custom"
  # utterances:
  #   theme: "github-light" # "github-dark"
  #   issue_term: "pathname"
  # giscus:
  #   repo_id:
  #   category_name:
  #   category_id:
  #   discussion_term: "pathname"
  #   reactions_enabled: '1'
  #   theme: "light"

# SEO / Feed
atom_feed:
  path: # blank (default) uses feed.xml
  hide: false
search: true
search_full_content: false
search_provider: lunr

# SEO Related
google_site_verification:
bing_site_verification:
naver_site_verification:
yandex_site_verification:
baidu_site_verification:

# Social Sharing
twitter:
  username:
facebook:
  username:
  app_id:
  publisher:
og_image: # Open Graph/Twitter default site image
og_image_alt:

social:
  type: Person # Person or Organization
  name: "Ethan"
  links:
    - "https://github.com/EthanKIEZ"

# Analytics
analytics:
  provider: false # false (default), "google", "google-universal", "google-gtag", "custom"
  # google:
  #   tracking_id: "UA-XXXXXXX-X"
  #   anonymize_ip: false

# Site Author
author:
  name: "Ethan"
  avatar: # path of avatar image, e.g. "/assets/images/bio-photo.jpg"
  bio: "热爱技术，喜欢记录。"
  location: "China"
  email:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/EthanKIEZ"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      # url: "mailto:your.email@example.com"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/EthanKIEZ"
    - label: "RSS"
      icon: "fas fa-fw fa-rss-square"
      url: "/feed.xml"
  since: "2026"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gemfile.lock
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - minimal-mistakes-jekyll.gemspec
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs
  - /test
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
  math_engine: mathjax

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed
  quiet_deps: true
  silence_deprecations: ['import']

# Outputting
permalink: /:categories/:title/
timezone: Asia/Shanghai

# Pagination
paginate: 5
paginate_path: /page:num/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
